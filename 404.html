<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Redirect</title>
  <!-- 新增：极简加载提示 -->
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
      color: #666;
    }
  </style>
</head>
<body>
  <div>正在跳转至正确页面...</div>
  <script>
    const path = window.location.pathname;
    const baseUrl = window.location.origin + window.location.pathname.split('/').slice(0, -1).join('/') + '/';
    window.location.href = baseUrl + '?redirect=' + encodeURIComponent(path);
  </script>
</body>
</html>
